name: 🚀 Deploy Strive Wheels to GitHub Pages

on:
  push:
    branches:
      - main          # Trigger on every push to main
  workflow_dispatch:  # Allow manual triggers from the Actions tab

# Grant GITHUB_TOKEN the rights needed to push to gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: ✅ Run Jest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm run test -- --ci --passWithNoTests

  # ─── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Production Bundle
    runs-on: ubuntu-latest
    needs: test         # Only build when tests pass
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        # VITE_BASE_URL must match your GitHub repository name exactly.
        # e.g. if your repo is github.com/youruser/strive_wheels → /strive_wheels/
        env:
          VITE_BASE_URL: /Strive-web/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # Vite outputs to ./dist by default

  # ─── 3. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
